description: InstDB is the institutional research data repository component of the
  FairStack suite (Chinese Academy of Sciences / CNIC). It supports publication review,
  discovery, access, and user services for openly published scientific data; standardized
  service interfaces for interoperability; and assigns persistent identifiers including
  DOI and CSTR. It integrates with the DataSpace collaboration tool for team workflows
  and is aimed at FAIR-oriented scientific data centers.
