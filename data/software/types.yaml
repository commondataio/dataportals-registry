# subtype_taxonomy_start
subtypes:
  data_portal_platform:
    description: "General-purpose software platforms built for publishing open data catalogs and portals."
  scientific_repository_platform:
    description: "Repository platforms for preserving, curating, and publishing scientific outputs and datasets."
  geospatial_catalog_platform:
    description: "Geoportal and SDI catalog platforms for spatial metadata discovery and map-centric data access."
  microdata_catalog_platform:
    description: "Platforms specialized for statistical microdata documentation, access workflows, and dissemination."
  indicators_data_platform:
    description: "Statistical indicators and time-series dissemination platforms."
  metadata_registry_platform:
    description: "Metadata registry and metadata catalog management platforms."
  protocol_or_api_server:
    description: "Protocol-first implementations exposing data/metadata APIs or interoperability services."
  geospatial_service_middleware:
    description: "Geospatial middleware/service engines providing map, feature, coverage, or catalog backend services."
  cms_or_app_framework:
    description: "General CMS/application frameworks commonly adapted to build data portals."
  managed_saas_service:
    description: "Primarily vendor-hosted SaaS data products operated as managed services."
  domain_data_infrastructure:
    description: "Domain-specific scientific data infrastructures combining curation, access, and analysis components."
  general_software:
    description: "Fallback for software that does not yet fit a more specific subtype."

