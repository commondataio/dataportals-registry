description: GeoNode is an open-source platform for building spatial data infrastructures
  and geospatial data portals. It combines cataloging, search, metadata management,
  map composition, access control, and publishing workflows, and exposes data through
  OGC services and REST APIs. GeoNode is developed by an international open-source
  community and supported within the OSGeo ecosystem.
