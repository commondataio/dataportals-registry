id: geoserver
name: GeoServer
website: https://geoserver.org
description: GeoServer is an open-source geospatial server for publishing and managing
  vector and raster data through OGC standards and REST APIs. It enables organizations
  to serve interoperable map and feature services (WMS, WFS, WCS, WMTS), style layers
  with SLD, transform and export data in multiple formats, and build spatial data
  infrastructures and open-data geoportals.
