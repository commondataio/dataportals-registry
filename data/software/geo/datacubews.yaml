id: datacubews
name: Datacube Open Web Services
website: https://www.opendatacube.org
description: Datacube Open Web Services (datacube-ows) is an open-source OGC service
  layer for Open Data Cube deployments. It publishes multidimensional Earth observation
  datasets through standards-based WMS and WCS endpoints, enabling map visualization
  and raster data access for analysis workflows. It is maintained by the Open Data
  Cube community and is commonly used to expose Analysis Ready Data from national
  and regional datacube infrastructures.
