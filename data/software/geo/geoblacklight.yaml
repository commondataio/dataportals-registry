description: GeoBlacklight is an open-source geospatial discovery platform built on
  Blacklight and Apache Solr. It offers map-based and keyword search, faceted browsing,
  customizable metadata (including OpenGeoMetadata and the GeoBlacklight schema),
  and download and export options for maps and datasets. It is developed as a multi-institutional
  collaboration; the software is copyright Stanford University and licensed under
  Apache 2.0.
