id: geonetwork
name: GeoNetwork
website: https://geonetwork-opensource.org
description: GeoNetwork is an open-source catalog for discovering and sharing geospatial
  data and services. It offers search, faceted browsing, metadata editing with ISO
  19115/19139 and Dublin Core, publication workflows, harvesting (CSW, OAI-PMH, WFS,
  and more), OGC CSW and REST APIs, DCAT export, and an interactive map viewer (OpenLayers)
  for WMS, WMTS, and related services. It is a reference implementation for spatial
  data infrastructures and is stewarded as an OSGeo project.
