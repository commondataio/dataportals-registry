id: opengeoportal
description: OpenGeoportal is an open-source geoportal platform for discovering, previewing,
  and accessing geospatial datasets across institutions. It supports federated search
  and metadata-driven discovery workflows for spatial data infrastructures, with integrations
  for standards-based geospatial services and export formats used by academic and
  public-sector data portals.
