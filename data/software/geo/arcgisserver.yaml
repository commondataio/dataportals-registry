description: ArcGIS Server is Esri's on-premises and private-cloud GIS server for
  publishing maps, feature layers, imagery, and geoprocessing as web services. It
  provides REST and SOAP endpoints plus OGC interfaces (WMS, WFS, WCS), CSW catalog
  services, and integrates with ArcGIS Enterprise components such as Portal for ArcGIS
  for security, licensing, and content management in regulated and air-gapped environments.
