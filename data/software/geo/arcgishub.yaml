name: ArcGIS Hub
website: https://hub.arcgis.com
description: ArcGIS Hub is Esri's cloud-based community engagement platform for sharing
  open data, maps, and initiatives. Organizations use it with ArcGIS Online to publish
  branded Hub sites, curate datasets and teams, run goals and initiatives, and engage
  the public with low-code web experiences. It exposes content through ArcGIS Hub
  and ArcGIS Online REST APIs, DCAT feeds, and OGC API Records, with governance and
  licensing options suited to government and enterprise open-data programs.
