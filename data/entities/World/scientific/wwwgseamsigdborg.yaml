description: The Molecular Signatures Database (MSigDB) is a joint project of UC
  San Diego and the Broad Institute, offering tens of thousands of annotated human
  and mouse gene sets for use with Gene Set Enrichment Analysis (GSEA) and related
  workflows. The site supports browsing, search, overlap analysis, and downloads;
  free registration is required for downloads and some web tools. Current releases
  are licensed under Creative Commons-style terms with additional conditions for
  certain gene sets; GSEA desktop software (v3.0+) is open source under a BSD-style
  license.
