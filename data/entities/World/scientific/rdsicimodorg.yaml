description: Regional Database System (RDS) is ICIMOD’s web-based clearing house
  for curated datasets across thematic areas in the Hindu Kush Himalaya (HKH).
  It offers free-text and advanced search (title, abstract, keywords, geographic
  extent), dataset discovery and download after registration, a Data Explorer
  for maps and charts, and links to related programmes. ICIMOD is a regional
  intergovernmental centre based in Kathmandu, Nepal, serving Afghanistan,
  Bangladesh, Bhutan, China, India, Myanmar, Nepal, and Pakistan.
