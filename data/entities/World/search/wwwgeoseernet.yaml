description: GeoSeer is a geospatial search engine that indexes OGC web services (WMS,
  WFS, WCS, WMTS). It discovers endpoints, fetches GetCapabilities documents, cleans and
  deduplicates layers, and records spatial extents. As of February 2026, GeoSeer's
  published statistics report about 3.53 million live datasets (~3.10 million distinct),
  about 350 thousand services across roughly 309 thousand endpoints, from about 4,235
  hosts in 97 countries. The free search and API omit some low-value layers; GeoSeer
  Licensed database products may include additional records.
