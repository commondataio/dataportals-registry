description: DataCite Commons is the public discovery interface for the PID Graph,
  a linked scholarly metadata graph built from DataCite DOIs and related persistent
  identifiers. It supports search and analytics for works (DOIs), people (ORCID iDs),
  organizations (ROR IDs, Crossref Funder Registry IDs), and repositories, surfacing
  citations, references, and other relationships together with COUNTER usage where
  available. The Commons web app is backed by DataCite’s public GraphQL and REST APIs.
