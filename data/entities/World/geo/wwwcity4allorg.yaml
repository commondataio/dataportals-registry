description: Cities For All (C4All) is a Global Compact on Inclusive and Accessible
  Cities initiative. The platform functions as a knowledge hub and training program,
  offering the Building Cities For All Training Programme, capacity-building for city
  leaders and local practitioners, and peer-to-peer learning through accessible online
  materials. It aims to transform 100 cities to be more inclusive, accessible and
  resilient by 2050.
