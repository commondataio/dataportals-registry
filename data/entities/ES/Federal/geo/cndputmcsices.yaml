description: Catalog of spatial data acquired during oceanographic cruises on board
  Spanish CSIC research vessels and RV Hespérides, aiming to disseminate data and
  metadata, and provide access to interoperable data following FAIR principles. Includes
  metadata from more than 700 cruises carried out since 1979, with links to cruise
  documentation, navigation maps, and datasets.
