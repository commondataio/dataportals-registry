description: Open data portal for the City of Charlottesville providing access to
  municipal data including property and land information, city operations, public
  safety, demographics, transportation, recreation, infrastructure, and environmental
  data. The portal features interactive maps and GIS data layers for exploring Charlottesville
  real estate data, tracking active construction projects, viewing crime incidents,
  and accessing resources related to sustainability initiatives.
